{{- $root := . -}}
{{- $domains := required "dnsNames is required" .Values.dnsNames }}
{{- range $gateway := .Values.gateways }}
{{- if $gateway.enabled }}
{{- $certificateDomain := first $domains }}
{{- $hostname := default (printf "*.%s" $certificateDomain) $gateway.hostname }}
{{- $secretName := default (include "wildcard-tls.secretName" (dict "root" $root "domain" $certificateDomain)) $gateway.certificateRefName }}
---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: {{ required "gateway name is required" $gateway.name | quote }}
  namespace: {{ $root.Values.namespace | quote }}
  labels:
    app.kubernetes.io/name: {{ $root.Chart.Name | quote }}
    app.kubernetes.io/instance: {{ $root.Release.Name | quote }}
    gateway.deokjong.io/exposure: {{ required "gateway exposure is required" $gateway.exposure | quote }}
  {{- with $gateway.annotations }}
  annotations:
{{ toYaml . | indent 4 }}
  {{- end }}
spec:
  gatewayClassName: {{ default $root.Values.gatewayClassName $gateway.gatewayClassName | quote }}
  listeners:
    - name: {{ default "http" $gateway.httpListenerName | quote }}
      hostname: {{ $hostname | quote }}
      port: 80
      protocol: HTTP
      allowedRoutes:
        namespaces:
          from: {{ default "All" $gateway.allowedRoutes.namespaces.from | quote }}
    - name: {{ default "https" $gateway.httpsListenerName | quote }}
      hostname: {{ $hostname | quote }}
      port: 443
      protocol: HTTPS
      tls:
        mode: Terminate
        certificateRefs:
          - kind: Secret
            name: {{ $secretName | quote }}
      allowedRoutes:
        namespaces:
          from: {{ default "All" $gateway.allowedRoutes.namespaces.from | quote }}
{{- end }}
{{- end }}
