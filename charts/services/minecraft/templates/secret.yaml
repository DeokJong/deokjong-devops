{{- $secretName := "minecraft-rcon" }}
{{- $namespace := include "minecraft.namespace" . }}
{{- $existing := lookup "v1" "Secret" $namespace $secretName }}
{{- $password := "" }}
{{- if and $existing $existing.data (index $existing.data "password") }}
{{- $password = index $existing.data "password" | b64dec }}
{{- else }}
{{- $password = randAlphaNum 32 }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  namespace: {{ $namespace }}
  labels:
    {{- include "minecraft.labels" . | nindent 4 }}
type: Opaque
data:
  password: {{ $password | b64enc | quote }}
