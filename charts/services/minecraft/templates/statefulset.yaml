apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: minecraft
  namespace: {{ include "minecraft.namespace" . }}
  labels:
    {{- include "minecraft.labels" . | nindent 4 }}
spec:
  serviceName: minecraft
  replicas: 1
  selector:
    matchLabels:
      {{- include "minecraft.labels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "minecraft.labels" . | nindent 8 }}
    spec:
      terminationGracePeriodSeconds: {{ .Values.gracefulShutdown.terminationGracePeriodSeconds }}
      {{- if or .Values.serverPack.url .Values.mods }}
      initContainers:
        - name: mod-downloader
          image: {{ .Values.modDownloader.image }}
          command:
            - /bin/sh
            - -c
            - |
              set -e

              {{- if .Values.serverPack.url }}
              # 서버팩: 최초 실행 시에만 /data 에 압축 해제
              if [ ! -f /data/.server-initialized ]; then
                echo "==> Downloading server pack..."
                apk add --no-cache unzip > /dev/null
                wget -q -O /tmp/serverpack "{{ .Values.serverPack.url }}"
                case "{{ .Values.serverPack.url }}" in
                  *.zip)
                    unzip -q /tmp/serverpack -d /data/
                    ;;
                  *.tar.gz|*.tgz)
                    tar -xzf /tmp/serverpack -C /data/
                    ;;
                  *)
                    echo "Unsupported archive format" && exit 1
                    ;;
                esac
                rm /tmp/serverpack
                touch /data/.server-initialized
                echo "==> Server pack extracted"
              else
                echo "==> Server pack already initialized, skipping"
              fi

              # 서버팩 모드를 emptyDir 로 복사
              if [ -d /data/mods ]; then
                echo "==> Copying server pack mods..."
                cp -r /data/mods/. /mods/
              fi
              {{- end }}

              {{- if .Values.mods }}
              # 추가 모드: emptyDir 에 다운로드 (매 시작마다 선언 상태로 유지)
              echo "==> Downloading extra mods..."
              {{- range .Values.mods }}
              wget -q -O /mods/$(basename "{{ . }}") "{{ . }}"
              {{- end }}
              echo "==> Extra mods downloaded"
              {{- end }}
          volumeMounts:
            - name: data
              mountPath: /data
            - name: mods
              mountPath: /mods
      {{- end }}
      containers:
        - name: minecraft
          image: {{ .Values.image.repository }}:{{ .Values.image.tag }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: minecraft
              containerPort: 25565
              protocol: TCP
            - name: rcon
              containerPort: 25575
              protocol: TCP
          env:
            {{- range $key, $val := .Values.env }}
            - name: {{ $key }}
              value: {{ $val | quote }}
            {{- end }}
          lifecycle:
            preStop:
              exec:
                command:
                  - /bin/sh
                  - -c
                  - |
                    rcon-cli say {{ .Values.gracefulShutdown.warningMessage | quote }}
                    sleep {{ .Values.gracefulShutdown.warningSeconds }}
                    rcon-cli save-all
                    sleep 3
                    rcon-cli stop
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: data
              mountPath: /data
            {{- if or .Values.serverPack.url .Values.mods }}
            - name: mods
              mountPath: /data/mods
            {{- end }}
      {{- if or .Values.serverPack.url .Values.mods }}
      volumes:
        - name: mods
          emptyDir: {}
      {{- end }}
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        {{- with .Values.storage.storageClassName }}
        storageClassName: {{ . | quote }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.storage.size }}
