apiVersion: v1
kind: Service
metadata:
  name: minecraft
  namespace: {{ include "minecraft.namespace" . }}
  labels:
    {{- include "minecraft.labels" . | nindent 4 }}
  {{- with .Values.service.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: ClusterIP
  selector:
    {{- include "minecraft.labels" . | nindent 4 }}
  ports:
    - name: minecraft
      port: {{ .Values.service.port }}
      targetPort: minecraft
      protocol: TCP
