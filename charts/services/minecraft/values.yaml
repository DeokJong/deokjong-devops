image:
  repository: itzg/minecraft-server
  tag: latest
  pullPolicy: IfNotPresent

serverName: ""
baseDomain: ""

env:
  EULA: "TRUE"
  TYPE: FABRIC
  VERSION: LATEST
  MEMORY: 2G
  MAX_PLAYERS: "20"
  VIEW_DISTANCE: "10"
  ONLINE_MODE: "true"
  ENABLE_RCON: "true"
  DIFFICULTY: normal

# 서버팩 아카이브 (zip / tar.gz) — 최초 실행 시 /data 에 압축 해제
# 이후 재시작에는 .server-initialized 플래그로 건너뜀 (월드/설정 보존)
serverPack:
  url: ""
  # e.g. https://example.com/atm10-server-1.0.0.zip

# 서버팩 외에 추가로 주입할 개별 모드 (항상 /data/mods 로 새로 다운로드)
mods: []
# - https://cdn.modrinth.com/data/xxx/versions/yyy/mod.jar

modDownloader:
  image: alpine:3.20

route:
  gateway:
    name: public-gateway
    namespace: gateway-system
    sectionName: minecraft

service:
  port: 25565
  annotations: {}

storage:
  size: 10Gi
  storageClassName: ""

gracefulShutdown:
  warningMessage: "Server shutting down..."
  warningSeconds: 30
  terminationGracePeriodSeconds: 120

resources: {}
