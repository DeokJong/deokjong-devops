image:
  repository: itzg/minecraft-server
  tag: latest
  pullPolicy: IfNotPresent

serverName: ""   # e.g. atm10 → atm10.{baseDomain}
baseDomain: ""   # e.g. mc.jinjin99.xyz

env:
  EULA: "TRUE"
  TYPE: FABRIC
  VERSION: LATEST
  MEMORY: 2G
  DIFFICULTY: normal
  MAX_PLAYERS: "20"
  VIEW_DISTANCE: "10"
  ONLINE_MODE: "true"
  ENABLE_RCON: "true"
  RCON_PASSWORD: "changeme"

# Init container가 서버 시작 전에 /data/mods 로 다운로드
mods: []
# - https://cdn.modrinth.com/data/xxx/versions/yyy/mod.jar

modDownloader:
  image: alpine:3.20

route:
  gateway:
    name: public-gateway
    namespace: gateway-system
    sectionName: minecraft

service:
  port: 25565
  annotations: {}

storage:
  size: 10Gi
  storageClassName: ""

gracefulShutdown:
  warningMessage: "Server shutting down..."
  warningSeconds: 30
  terminationGracePeriodSeconds: 120

resources:
  requests:
    memory: 2Gi
    cpu: 500m
  limits:
    memory: 3Gi
    cpu: "2"
