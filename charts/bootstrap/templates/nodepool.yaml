{{- range .Values.nodePools }}
---
apiVersion: karpenter.sh/v1
kind: NodePool
metadata:
  name: {{ .name }}
spec:
  disruption:
    consolidationPolicy: {{ dig "disruption" "consolidationPolicy" "WhenEmptyOrUnderutilized" . }}
    consolidateAfter: {{ dig "disruption" "consolidateAfter" "30s" . }}
    budgets:
      {{- dig "disruption" "budgets" (list (dict "nodes" "10%")) . | toYaml | nindent 6 }}
  template:
    spec:
      expireAfter: {{ .expireAfter | default "336h" }}
      terminationGracePeriod: {{ .terminationGracePeriod | default "24h0m0s" }}
      nodeClassRef:
        group: eks.amazonaws.com
        kind: NodeClass
        name: {{ .nodeClassName }}
      requirements:
        {{- $defaults := dict
          "karpenter.sh/capacity-type" (dict "operator" "In" "values" (list "on-demand" "spot"))
          "eks.amazonaws.com/instance-category" (dict "operator" "In" "values" (list "c" "m" "r"))
          "eks.amazonaws.com/instance-generation" (dict "operator" "Gt" "values" (list "4"))
          "kubernetes.io/arch" (dict "operator" "In" "values" (list "amd64" "arm64"))
          "kubernetes.io/os" (dict "operator" "In" "values" (list "linux"))
        }}
        {{- range .requirements }}
        {{- $_ := set $defaults .key (dict "operator" .operator "values" .values) }}
        {{- end }}
        {{- $result := list }}
        {{- range $key, $val := $defaults }}
        {{- $result = append $result (dict "key" $key "operator" $val.operator "values" $val.values) }}
        {{- end }}
        {{- toYaml $result | nindent 8 }}
      {{- with .taints }}
      taints:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
