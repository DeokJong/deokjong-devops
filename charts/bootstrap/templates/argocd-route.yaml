{{- with .Values.argocdRoute }}
{{- if .enabled }}
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: argocd-server
  namespace: {{ default "argocd" $.Values.argocdNamespace }}
spec:
  hostnames:
{{- toYaml .hostnames | nindent 4 }}
  parentRefs:
{{- toYaml .parentRefs | nindent 4 }}
  rules:
{{- toYaml .rules | nindent 4 }}
{{- with .redirect }}
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: argocd-server-redirect
  namespace: {{ default "argocd" $.Values.argocdNamespace }}
spec:
  hostnames:
{{- toYaml $.Values.argocdRoute.hostnames | nindent 4 }}
  parentRefs:
{{- toYaml .parentRefs | nindent 4 }}
  rules:
    - filters:
        - type: RequestRedirect
          requestRedirect:
            scheme: https
            statusCode: {{ default 301 .statusCode }}
{{- end }}
{{- end }}
{{- end }}
