{{- range .Values.nodeClasses }}
---
apiVersion: eks.amazonaws.com/v1
kind: NodeClass
metadata:
  name: {{ .name }}
spec:
  role: {{ .role }}
  ephemeralStorage:
    size: {{ default "80Gi" .ephemeralStorage.size }}
    iops: {{ default "3000" .ephemeralStorage.iops }}
    throughput: {{ default 125 .ephemeralStorage.throughput }}
  networkPolicy: {{ default "DefaultAllow" .networkPolicy }}
  networkPolicyEventLogs: {{ default "Disabled" .networkPolicyEventLogs }}
  snatPolicy: {{ default "Random" .snatPolicy }}
  securityGroupSelectorTerms:
    {{- toYaml .securityGroupSelectorTerms | nindent 4 }}
  subnetSelectorTerms:
    {{- toYaml .subnetSelectorTerms | nindent 4 }}
{{- end }}