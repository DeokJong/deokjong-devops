gateways:
  - name: public-gateway
    exposure: public
    annotations:
      service.beta.kubernetes.io/aws-load-balancer-scheme: internet-facing
    certificateRef:
      name: wildcard-sandbox-jinjin99-xyz-tls
    allowedRoutes:
      namespaces:
        from: All
    extraListeners:
      - name: minecraft
        port: 25565
        protocol: TCP
        allowedRoutes:
          namespaces:
            from: All
  - name: private-gateway
    exposure: private
    certificateRef:
      name: wildcard-sandbox-jinjin99-xyz-tls
    allowedRoutes:
      namespaces:
        from: All
    extraListeners: []
