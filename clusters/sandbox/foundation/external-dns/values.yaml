appName: sandbox-external-dns
chartPath: charts/foundation/external-dns
releaseName: external-dns
namespace: external-dns
syncWave: "2"

external-dns-private:
  fullnameOverride: external-dns-private

  serviceAccount:
    name: external-dns-private

  domainFilters:
    - jinjin99.xyz

  sources:
    - gateway-httproute

  provider:
    name: aws

  extraArgs:
    - --aws-zone-type=private
    - --txt-owner-id=sandbox-private
    - --policy=sync
    - --interval=1m
    - --gateway-name=internal-gateway

  env:
    - name: AWS_DEFAULT_REGION
      value: ap-northeast-2

  tolerations:
    - key: CriticalAddonsOnly
      operator: Exists
      effect: NoSchedule

external-dns-public:
  fullnameOverride: external-dns-public

  serviceAccount:
    name: external-dns-public

  domainFilters:
    - jinjin99.xyz

  sources:
    - gateway-httproute

  provider:
    name: aws

  extraArgs:
    - --aws-zone-type=public
    - --txt-owner-id=sandbox-public
    - --policy=sync
    - --interval=1m
    - --gateway-name=public-gateway

  env:
    - name: AWS_DEFAULT_REGION
      value: ap-northeast-2

  tolerations:
    - key: CriticalAddonsOnly
      operator: Exists
      effect: NoSchedule
