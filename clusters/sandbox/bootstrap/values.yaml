appName: sandbox-bootstrap
chartPath: charts/bootstrap
releaseName: bootstrap
namespace: argocd
syncWave: "-1"

argo-cd:
  global:
    tolerations:
      - key: CriticalAddonsOnly
        operator: Exists
        effect: NoSchedule
  server:
    service:
      type: ClusterIP

argocdRoute:
  enabled: true
  hostnames:
    - argocd.sandbox.jinjin99.xyz
  gatewayType: private
  backendRefs:
    - name: bootstrap-argocd-server
      port: 80

nodePools:
  - name: general-purpose
    nodeClassName: default

storageClasses:
  - name: gp3
    provisioner: ebs.csi.eks.amazonaws.com
    parameters:
      type: gp3
      fsType: ext4
    reclaimPolicy: Delete
    volumeBindingMode: WaitForFirstConsumer
