argo-cd:
  configs:
    repositories:
      gha-runner-scale-set-controller:
        type: helm
        name: gha-runner-scale-set-controller
        url: ghcr.io/actions/actions-runner-controller-charts
        enableOCI: true
  global:
    tolerations:
      - key: CriticalAddonsOnly
        operator: Exists
        effect: NoSchedule
  server:
    extraArgs:
      - --insecure
    replicas: 2
    pdb:
      enabled: true
      minAvailable: 1
    service:
      type: ClusterIP
  repoServer:
    replicas: 2
    pdb:
      enabled: true
      minAvailable: 1
  applicationSet:
    replicas: 2
    pdb:
      enabled: true
      minAvailable: 1
  controller:
    replicas: 2
    dynamicClusterDistribution: true
    pdb:
      enabled: true
      minAvailable: 1
  redis-ha:
    enabled: true
    hardAntiAffinity: false
    tolerations:
      - key: CriticalAddonsOnly
        operator: Exists
        effect: NoSchedule
    haproxy:
      hardAntiAffinity: false
      tolerations:
        - key: CriticalAddonsOnly
          operator: Exists
          effect: NoSchedule

argocdRoute:
  enabled: true
  hostnames:
    - argocd.sandbox.jinjin99.xyz
  gatewayType: private
  backendRefs:
    - name: bootstrap-argocd-server
      port: 80

nodeClasses:
  - name: default-deokjong
    role: deokjong-sandbox-eks-auto-20260515143157360300000001
    securityGroupSelectorTerms:
      - id: sg-0e7c061de96f5421c
    subnetSelectorTerms:
      - tags:
          karpenter.sh/discovery/private: "-"

nodePools:
  - name: general-purpose-deokjong
    nodeClassName: default-deokjong
  - name: system-deokjong
    nodeClassName: default-deokjong
    taints:
     - key: CriticalAddonsOnly
       effect: NoSchedule

storageClasses:
  - name: gp3
    provisioner: ebs.csi.eks.amazonaws.com
    parameters:
      type: gp3
      fsType: ext4
    reclaimPolicy: Delete
    volumeBindingMode: WaitForFirstConsumer
