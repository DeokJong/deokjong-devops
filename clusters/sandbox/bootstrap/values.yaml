appName: bootstrap
chartPath: charts/bootstrap
releaseName: bootstrap
namespace: argocd
syncWave: "-1"

argo-cd:
  global:
    tolerations:
      - key: CriticalAddonsOnly
        operator: Exists
        effect: NoSchedule
  server:
    extraArgs:
      - --insecure
    replicas: 2
    pdb:
      enabled: true
      minAvailable: 1
    service:
      type: ClusterIP
  repoServer:
    replicas: 2
    pdb:
      enabled: true
      minAvailable: 1
  applicationSet:
    replicas: 2
    pdb:
      enabled: true
      minAvailable: 1
  controller:
    replicas: 2
    dynamicClusterDistribution: true
    pdb:
      enabled: true
      minAvailable: 1
  redis-ha:
    enabled: true
    hardAntiAffinity: false
    tolerations:
      - key: CriticalAddonsOnly
        operator: Exists
        effect: NoSchedule
    haproxy:
      hardAntiAffinity: false
      tolerations:
        - key: CriticalAddonsOnly
          operator: Exists
          effect: NoSchedule

argocdRoute:
  enabled: true
  hostnames:
    - argocd.sandbox.jinjin99.xyz
  gatewayType: private
  backendRefs:
    - name: bootstrap-argocd-server
      port: 80

nodePools:
  - name: general-purpose
    nodeClassName: default

storageClasses:
  - name: gp3
    provisioner: ebs.csi.eks.amazonaws.com
    parameters:
      type: gp3
      fsType: ext4
    reclaimPolicy: Delete
    volumeBindingMode: WaitForFirstConsumer
