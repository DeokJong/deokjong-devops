apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: root
  namespace: argocd
spec:
  project: default
  sources:
    - repoURL: https://github.com/deokjong/deokjong-devops.git
      targetRevision: main
      path: charts/cluster
      helm:
        releaseName: sandbox
        valueFiles:
          - $values/clusters/sandbox/config.yaml
    - repoURL: https://github.com/deokjong/deokjong-devops.git
      targetRevision: main
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true